# 硬件参数：设备路径 + 关节映射/标定
device: "/dev/servo_pulse"
# PC 上先干跑（不需要 /dev/servo_pulse），上板后改为 false
dry_run: true

# 关节列表
joints:
  - name: shoulder_pan_joint
    servo_id: 0
    angle_min: -0.05    
    angle_max: 3.05     
    pulse_min_ns: 400000
    pulse_max_ns: 2600000
    pulse_zero_ns: 900000
    direction: 1
    offset_rad: 0.0
  - name: shoulder_lift_joint
    servo_id: 1
    angle_min: -1.75
    angle_max: 1.05
    pulse_min_ns: 400000
    pulse_max_ns: 1900000
    pulse_zero_ns: 1200000
    direction: 1
    offset_rad: 0.0
  - name: elbow_joint
    servo_id: 2
    angle_min: -1.10
    angle_max: 1.05
    pulse_min_ns: 1200000
    pulse_max_ns: 2600000
    pulse_zero_ns: 2000000
    direction: -1
    offset_rad: 0.0
  - name: wrist_1_joint
    servo_id: 3
    angle_min: -1.10
    angle_max: 1.60
    pulse_min_ns: 300000
    pulse_max_ns: 2200000
    pulse_zero_ns: 900000
    direction: 1
    offset_rad: 0.0
  - name: wrist_2_joint
    servo_id: 4
    angle_min: -1.05
    angle_max: 2.05
    pulse_min_ns: 300000
    pulse_max_ns: 2600000
    pulse_zero_ns: 1300000
    direction: 1
    offset_rad: 0.0
  - name: finger_joint
    servo_id: 5
    angle_min: -0.05
    angle_max: 1.65
    pulse_min_ns: 1300000
    pulse_max_ns: 2600000
    pulse_zero_ns: 1600000
    direction: 1
    offset_rad: 0.0

